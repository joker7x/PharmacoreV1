
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pharma Core Premium</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
    :root { 
      --brand-blue: #2563eb; 
      --brand-emerald: #10b981; 
      --brand-rose: #f43f5e; 
    }
    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'IBM Plex Sans Arabic', sans-serif; 
      background-color: #f8fafc; 
      color: #0f172a; 
      overflow-x: hidden; 
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .dark body { background-color: #09090b; color: #fafafa; }
    
    .premium-card, .glass-effect, .view-container {
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .dark .glass-effect { background: rgba(18, 18, 20, 0.9); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    
    .premium-card { 
      background: white; 
      border: 1px solid rgba(241, 245, 249, 1); 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); 
    }
    .dark .premium-card { background: #18181b; border: 1px solid rgba(255, 255, 255, 0.08); }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .loading-shimmer { 
      background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.05) 50%, transparent 75%); 
      background-size: 200% 100%; 
      animation: shimmer 1.5s infinite linear; 
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@1.30.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/"
  }
}
</script>
</head>
<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
