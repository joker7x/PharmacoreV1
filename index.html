<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DWA Prices Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

    :root {
      --brand-blue: #3b82f6;
      --brand-emerald: #10b981;
      --brand-rose: #f43f5e;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    /* Improved high-contrast dark background */
    .dark body { 
      background-color: #09090b; 
      color: #fafafa; 
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .dark .glass-effect {
      background: rgba(18, 18, 20, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .premium-card {
      background: white;
      border: 1px solid rgba(241, 245, 249, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Distinct card background for dark mode to ensure separation */
    .dark .premium-card {
      background: #18181b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .premium-card:active {
      transform: scale(0.98);
    }

    .shadow-mobile-lg {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .dark .shadow-mobile-lg {
      box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.5);
    }

    * { 
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-font-smoothing: antialiased;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe { padding-top: env(safe-area-inset-top); }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .loading-shimmer {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }
    .dark .loading-shimmer {
      background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
    }

    /* Subtle top highlight for cards in dark mode */
    .dark .card-glow {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        z-index: 5;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@1.30.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/"
  }
}
</script>
</head>
<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
