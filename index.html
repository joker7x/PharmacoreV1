
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pharma Core</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.process = { env: { API_KEY: "" } };
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#3b82f6',
              dark: '#050505',
              surface: '#111113',
              accent: '#6366f1'
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'IBM Plex Sans Arabic', sans-serif; 
      background-color: #050505; 
      color: #fafafa;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #root { height: 100vh; width: 100vw; overflow-y: auto; overflow-x: hidden; }
    .terminal-container {
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: #050505; 
      flex-direction: column; 
      gap: 24px;
    }
    .terminal-loader {
      width: 40px; 
      height: 40px; 
      border: 2px solid rgba(59, 130, 246, 0.1); 
      border-top-color: #3b82f6; 
      border-radius: 50%; 
      animation: spin 0.6s linear infinite;
    }
    .terminal-text {
      font-size: 10px; 
      font-weight: 700; 
      color: #3b82f6; 
      letter-spacing: 0.3em; 
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@1.30.1",
    "html5-qrcode": "https://esm.sh/html5-qrcode@2.3.8",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body class="dark antialiased">
  <div id="root">
    <div class="terminal-container">
      <div class="terminal-loader"></div>
      <div class="terminal-text">Booting Core System...</div>
    </div>
  </div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
